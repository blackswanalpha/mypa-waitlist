# mypa-waitlist — production deployment (Coolify + Convex Cloud): web only.
#
# The full local self-hosted stack (backend + dashboard + web) lives in
# docker-compose.yml; use that for local dev via scripts/docker-init.sh.
# In production the Convex deployment is Convex Cloud, so nothing but the
# Next.js app needs to run — point Coolify's "Docker Compose Location" at
# this file.
#
# Required env (set in Coolify, build-time enabled):
#   NEXT_PUBLIC_CONVEX_URL  https://<deployment>.convex.cloud (baked into the
#                           client bundle at build time)
#   CONVEX_SERVER_URL       same URL (middleware's server-side Convex URL)
#   CONVEX_DEPLOY_KEY       production deploy key — used only by
#                           `convex codegen` during the image build

name: mypa-waitlist-prod

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL:?set to the Convex Cloud URL}
        CONVEX_DEPLOY_KEY: ${CONVEX_DEPLOY_KEY:-}
    image: mypa-waitlist-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - CONVEX_SERVER_URL=${CONVEX_SERVER_URL:?set to the Convex Cloud URL}
    healthcheck:
      test: wget -qO /dev/null http://127.0.0.1:3000/
      interval: 10s
      start_period: 15s
    restart: unless-stopped
